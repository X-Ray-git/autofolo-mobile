name: autofolo
description: "Auto Folo - RSS 信息流浏览器"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状态管理
  get: ^4.7.2

  # 网络请求
  dio: ^5.7.0

  # 本地存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5

  # 动态取色 (Material You)
  dynamic_color: ^1.8.1
  flex_seed_scheme: ^4.0.1

  # Toast / Dialog
  flutter_smart_dialog: ^4.9.8+5

  # 图片加载
  cached_network_image: ^3.4.1

  # HTML 渲染
  flutter_html: ^3.0.0-beta.2
  html: ^0.15.4

  # 时间格式化
  intl: ^0.20.2

  # 高帧率
  flutter_displaymode: ^0.7.0

  # URL 启动
  url_launcher: ^6.3.1

  # 设备信息
  device_info_plus: ^12.1.0
  package_info_plus: ^9.0.0

  # SVG 支持（Auto Folo 图标等）
  flutter_svg: ^2.0.14

  # 权限（保存图片等）
  permission_handler: ^11.3.1

  # 分享 / 保存图片
  share_plus: ^10.1.4
  image_gallery_saver_plus: ^4.0.1

  # 视频播放
  video_player: ^2.9.5
  vector_math: ^2.2.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
